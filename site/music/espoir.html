        <h3>楽曲について</h3>
        <p>声劇「Espoir」（上演：Première étoile）のために書き下ろした作品。架空の19世紀末フランス人作曲家の作品という設定で作曲されました。第一楽章は子供と戯れる道化曲、第二楽章はそれと対になる子守唄、第三楽章は定例のメヌエットに代えて19世紀に流行したワルツを採用し、第四楽章の「Espoir（希望）」で子供へとつながっていきます。</p>
